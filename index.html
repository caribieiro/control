<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Control IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
/* ════════════════════════════════════════════════════
   DESIGN TOKENS
════════════════════════════════════════════════════ */
:root {
  /* Surfaces */
  --bg:         #07070A;
  --s1:         #0D0D12;
  --s2:         #121217;
  --s3:         #18181F;
  --s4:         #1F1F28;
  --s5:         #26262F;

  /* Borders */
  --b1:         rgba(255,255,255,0.055);
  --b2:         rgba(255,255,255,0.09);
  --b3:         rgba(255,255,255,0.14);

  /* Text */
  --t1:         #EDEcf5;
  --t2:         #9896A8;
  --t3:         #56546A;
  --t4:         #363548;

  /* Accent violet */
  --accent:     #7C6EFA;
  --accent-2:   #6254E8;
  --accent-dim: rgba(124,110,250,0.12);
  --accent-glow:rgba(124,110,250,0.22);
  --accent-ring:rgba(124,110,250,0.35);

  /* Semantic */
  --green:      #10B981;
  --red:        #EF4444;
  --amber:      #F59E0B;
  --green-dim:  rgba(16,185,129,0.12);
  --red-dim:    rgba(239,68,68,0.10);

  /* Geometry */
  --r-xs: 6px;
  --r-sm: 10px;
  --r-md: 14px;
  --r-lg: 18px;
  --r-xl: 24px;
  --r-full: 9999px;

  /* Shadows */
  --sh-sm: 0 1px 3px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.3);
  --sh-md: 0 4px 16px rgba(0,0,0,0.5), 0 2px 6px rgba(0,0,0,0.3);
  --sh-lg: 0 16px 48px rgba(0,0,0,0.6), 0 6px 16px rgba(0,0,0,0.4);
  --sh-accent: 0 8px 32px rgba(124,110,250,0.28), 0 2px 8px rgba(124,110,250,0.18);

  /* Motion */
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --t-fast: 120ms;
  --t-base: 200ms;
  --t-slow: 300ms;
}

/* ════════════════════════════════════════════════════
   RESET & BASE
════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  height: 100%;
  height: -webkit-fill-available;
}

body {
  height: 100%;
  height: 100dvh;
  overflow: hidden;
  overscroll-behavior: none;
  -webkit-overflow-scrolling: touch;
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--t1);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Grain overlay */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 9999;
  pointer-events: none;
  opacity: 0.028;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size: 128px 128px;
}

::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--s5); border-radius: var(--r-full); }
::-webkit-scrollbar-thumb:hover { background: var(--b2); }

/* ════════════════════════════════════════════════════
   LAYOUT ROOT
════════════════════════════════════════════════════ */
.app {
  display: grid;
  grid-template-columns: 272px 1fr;
  height: 100vh;
  height: 100dvh;
  max-height: 100dvh;
  overflow: hidden;
  position: fixed;
  inset: 0;
}

/* ════════════════════════════════════════════════════
   SIDEBAR
════════════════════════════════════════════════════ */
.sidebar {
  display: flex;
  flex-direction: column;
  background: var(--s1);
  border-right: 1px solid var(--b1);
  overflow: hidden;
  position: relative;
}

/* Ambient glow top-right */
.sidebar::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 220px; height: 220px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(124,110,250,0.14) 0%, transparent 70%);
  pointer-events: none;
}

/* ─ Brand ─ */
.sb-header {
  padding: 20px 16px 16px;
  flex-shrink: 0;
}

.sb-brand {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  background: var(--s2);
  border: 1px solid var(--b1);
  border-radius: var(--r-md);
  position: relative;
  overflow: hidden;
}

.sb-brand::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
}

.sb-logomark {
  width: 34px; height: 34px;
  border-radius: var(--r-sm);
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  display: grid; place-items: center;
  flex-shrink: 0;
  box-shadow: var(--sh-accent);
  position: relative;
}

.sb-logomark svg { color: #fff; }

.sb-wordmark { line-height: 1; }
.sb-name {
  font-size: 13.5px;
  font-weight: 700;
  color: var(--t1);
  letter-spacing: -0.01em;
}
.sb-sub {
  font-size: 11px;
  color: var(--t3);
  margin-top: 2px;
  font-weight: 400;
}

/* Status pill */
.status-pill {
  margin-left: auto;
  display: flex; align-items: center; gap: 5px;
  padding: 4px 8px;
  background: var(--green-dim);
  border: 1px solid rgba(16,185,129,0.2);
  border-radius: var(--r-full);
}
.status-pill.err { background: var(--red-dim); border-color: rgba(239,68,68,0.2); }

.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2.4s infinite;
}
.status-pill.err .status-dot { background: var(--red); animation: none; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.45; }
}

.status-txt {
  font-size: 10px;
  font-weight: 600;
  color: var(--green);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.status-pill.err .status-txt { color: var(--red); }

/* ─ Nav button ─ */
.sb-new-btn {
  margin: 0 16px 8px;
  width: calc(100% - 32px);
  height: 40px;
  display: flex; align-items: center; justify-content: center; gap: 7px;
  background: var(--accent-dim);
  border: 1px solid rgba(124,110,250,0.25);
  border-radius: var(--r-sm);
  color: var(--accent);
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background var(--t-base) var(--ease),
              border-color var(--t-base) var(--ease),
              transform var(--t-fast) var(--ease);
  flex-shrink: 0;
  letter-spacing: 0.01em;
}
.sb-new-btn:hover {
  background: rgba(124,110,250,0.2);
  border-color: rgba(124,110,250,0.4);
  transform: translateY(-1px);
}
.sb-new-btn:active { transform: translateY(0); }

/* ─ Section label ─ */
.sb-section {
  padding: 0 16px;
  flex-shrink: 0;
}

.sb-label {
  display: flex; align-items: center; gap: 6px;
  font-size: 10.5px;
  font-weight: 700;
  color: var(--t3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 8px;
  padding: 0 4px;
}

/* ─ Template items ─ */
.sb-tpl-list { display: flex; flex-direction: column; gap: 2px; }

.sb-tpl-btn {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 12px;
  border-radius: var(--r-sm);
  background: transparent;
  border: 1px solid transparent;
  cursor: pointer;
  transition: background var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease);
  text-align: left; width: 100%;
}
.sb-tpl-btn:hover {
  background: var(--s3);
  border-color: var(--b1);
}

.sb-tpl-icon {
  width: 28px; height: 28px;
  border-radius: var(--r-xs);
  background: var(--s3);
  border: 1px solid var(--b1);
  display: grid; place-items: center;
  flex-shrink: 0;
  color: var(--accent);
  margin-top: 1px;
}

.sb-tpl-copy { flex: 1; }
.sb-tpl-title {
  font-size: 12.5px;
  font-weight: 600;
  color: var(--t1);
  margin-bottom: 2px;
  line-height: 1.3;
}
.sb-tpl-desc {
  font-size: 11px;
  color: var(--t3);
  line-height: 1.4;
}

/* ─ Divider ─ */
.sb-divider {
  height: 1px;
  background: var(--b1);
  margin: 12px 16px;
  flex-shrink: 0;
}

/* ─ Footer ─ */
.sb-footer {
  margin-top: auto;
  padding: 12px 16px 16px;
  flex-shrink: 0;
}

.sb-session-card {
  padding: 12px;
  background: var(--s2);
  border: 1px solid var(--b1);
  border-radius: var(--r-md);
}

.sb-session-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--t3);
  margin-bottom: 6px;
}

.sb-session-id {
  font-size: 11px;
  color: var(--t2);
  font-variant-numeric: tabular-nums;
  word-break: break-all;
  line-height: 1.5;
}

/* ════════════════════════════════════════════════════
   MAIN PANEL
════════════════════════════════════════════════════ */
.main {
  display: flex;
  flex-direction: column;
  background: var(--bg);
  position: relative;
  overflow: hidden;
  min-height: 0; /* critical: allows flex children to shrink below content size */
}

/* Ambient mesh bg */
.main::before {
  content: '';
  position: absolute;
  top: -120px; right: -120px;
  width: 500px; height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(124,110,250,0.065) 0%, transparent 65%);
  pointer-events: none;
  z-index: 0;
}
.main::after {
  content: '';
  position: absolute;
  bottom: 80px; left: -100px;
  width: 400px; height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(16,185,129,0.035) 0%, transparent 65%);
  pointer-events: none;
  z-index: 0;
}

/* ─ Header ─ */
.chat-header {
  position: relative; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  height: 60px;
  background: rgba(7,7,10,0.8);
  backdrop-filter: blur(20px) saturate(1.4);
  -webkit-backdrop-filter: blur(20px) saturate(1.4);
  border-bottom: 1px solid var(--b1);
  flex-shrink: 0;
}

.ch-left { display: flex; align-items: center; gap: 12px; }

.hamburger {
  display: none;
  width: 36px; height: 36px;
  border-radius: var(--r-sm);
  border: none;
  background: transparent;
  cursor: pointer;
  place-items: center;
  color: var(--t2);
  transition: background var(--t-fast) var(--ease), color var(--t-fast) var(--ease);
}
.hamburger:hover { background: var(--s3); color: var(--t1); }

.ch-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--t1);
  letter-spacing: -0.01em;
}

.ch-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 8px;
  background: var(--s3);
  border: 1px solid var(--b1);
  border-radius: var(--r-full);
}

.ch-badge-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2.4s infinite;
}
.ch-badge-dot.err { background: var(--red); animation: none; }

.ch-badge-txt {
  font-size: 11px;
  font-weight: 600;
  color: var(--t2);
  letter-spacing: 0.02em;
}

.ch-right { display: flex; align-items: center; gap: 6px; }

.hdr-action {
  display: flex; align-items: center; gap: 6px;
  height: 34px;
  padding: 0 12px;
  border-radius: var(--r-sm);
  border: 1px solid var(--b1);
  background: var(--s2);
  color: var(--t2);
  font-family: inherit;
  font-size: 12.5px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--t-base) var(--ease);
}
.hdr-action:hover { background: var(--s3); border-color: var(--b2); color: var(--t1); }

.hdr-icon-btn {
  width: 34px; height: 34px;
  border-radius: var(--r-sm);
  border: 1px solid var(--b1);
  background: var(--s2);
  color: var(--t3);
  cursor: pointer;
  display: grid; place-items: center;
  transition: all var(--t-base) var(--ease);
}
.hdr-icon-btn:hover { background: var(--s3); border-color: var(--b2); color: var(--t2); }

/* ─ Feed ─ */
.feed {
  flex: 1;
  min-height: 0; /* critical for flex overflow scroll */
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  position: relative; z-index: 1;
  padding: 24px 40px 16px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  scroll-behavior: smooth;
  overscroll-behavior: contain;
}

/* Day separator */
.day-sep {
  align-self: center;
  display: flex; align-items: center; gap: 10px;
  margin: 16px 0 20px;
  width: 100%;
}
.day-sep::before, .day-sep::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--b1), transparent);
}
.day-sep-txt {
  font-size: 11px;
  font-weight: 600;
  color: var(--t3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  white-space: nowrap;
}

/* Message row */
.msg-row {
  display: flex;
  gap: 10px;
  max-width: 720px;
  animation: msgIn 0.24s var(--ease) both;
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg-row.user { margin-left: auto; flex-direction: row-reverse; }
.msg-row.agent + .msg-row.agent { margin-top: 2px; }
.msg-row.user  + .msg-row.user  { margin-top: 2px; }
.msg-row + .msg-row { margin-top: 12px; }
.msg-row.user  + .msg-row.user,
.msg-row.agent + .msg-row.agent { margin-top: 3px; }

/* Avatar */
.msg-av {
  width: 32px; height: 32px;
  border-radius: var(--r-sm);
  display: grid; place-items: center;
  font-size: 12px;
  font-weight: 800;
  flex-shrink: 0;
  align-self: flex-end;
  margin-bottom: 2px;
  letter-spacing: -0.02em;
}
.msg-row.agent .msg-av {
  background: linear-gradient(135deg, var(--s4), var(--s3));
  border: 1px solid var(--b2);
  color: var(--accent);
}
.msg-row.user .msg-av {
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: rgba(255,255,255,0.9);
  box-shadow: 0 4px 14px var(--accent-glow);
}

/* Group avatar: só mostra no primeiro da sequência */
.msg-row.agent.cont .msg-av,
.msg-row.user.cont  .msg-av { visibility: hidden; }

/* Bubble */
.msg-body-wrap { display: flex; flex-direction: column; }
.msg-row.user .msg-body-wrap { align-items: flex-end; }

.msg-bubble {
  position: relative;
  padding: 11px 15px;
  border-radius: var(--r-md);
  font-size: 13.5px;
  line-height: 1.65;
  word-break: break-word;
  box-shadow: var(--sh-sm);
}

.msg-row.agent .msg-bubble {
  background: var(--s2);
  border: 1px solid var(--b1);
  color: var(--t1);
  border-bottom-left-radius: 4px;
}

/* Accent left bar on agent messages */
.msg-row.agent .msg-bubble::before {
  content: '';
  position: absolute;
  left: -1px; top: 12px; bottom: 12px;
  width: 2px;
  background: linear-gradient(180deg, var(--accent), transparent);
  border-radius: var(--r-full);
  opacity: 0.5;
}
.msg-row.agent.cont .msg-bubble { border-bottom-left-radius: 4px; border-top-left-radius: 4px; }

.msg-row.user .msg-bubble {
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
  color: #fff;
  border-bottom-right-radius: 4px;
  box-shadow: var(--sh-accent);
}
.msg-row.user.cont .msg-bubble { border-bottom-right-radius: 4px; border-top-right-radius: 4px; }

.msg-bubble.err {
  background: rgba(239,68,68,0.08) !important;
  border-color: rgba(239,68,68,0.2) !important;
  color: #fca5a5 !important;
}
.msg-bubble.err::before { display: none; }

/* File chip inside bubble */
.file-chip-in {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 10px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--r-sm);
  font-size: 12px;
  margin-bottom: 8px;
  color: rgba(255,255,255,0.7);
  max-width: 100%;
}
.file-chip-in span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Meta row */
.msg-meta {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 3px 0;
  font-size: 10.5px;
  color: var(--t3);
}
.msg-row.user .msg-meta { flex-direction: row-reverse; }

.msg-meta .ticks { display: flex; color: var(--accent); opacity: 0.7; }

/* Typing indicator */
.typing-row {
  display: flex;
  gap: 10px;
  max-width: 720px;
  animation: msgIn 0.24s var(--ease) both;
}
.typing-bubble {
  background: var(--s2);
  border: 1px solid var(--b1);
  border-radius: var(--r-md);
  border-bottom-left-radius: 4px;
  padding: 14px 18px;
  display: flex; align-items: center; gap: 5px;
  box-shadow: var(--sh-sm);
}
.typing-bubble span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: typedot 1.4s infinite var(--ease);
}
.typing-bubble span:nth-child(2) { animation-delay: 0.16s; }
.typing-bubble span:nth-child(3) { animation-delay: 0.32s; }
@keyframes typedot {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.25; }
  40%            { transform: scale(1.15); opacity: 1; }
}

/* ════════════════════════════════════════════════════
   COMPOSER
════════════════════════════════════════════════════ */
.composer-outer {
  position: relative; z-index: 10;
  padding: 12px 24px 20px;
  padding-bottom: max(20px, calc(12px + env(safe-area-inset-bottom)));
  flex-shrink: 0;
  background: var(--bg); /* solid bg so it never overlaps feed */
}

/* Template popup */
.tpl-popup {
  position: absolute;
  bottom: calc(100% + 4px);
  left: 24px; right: 24px;
  background: var(--s2);
  border: 1px solid var(--b2);
  border-radius: var(--r-xl);
  overflow: hidden;
  box-shadow: var(--sh-lg);
  display: none; z-index: 60;
  animation: popIn 0.2s var(--ease-spring) both;
}
.tpl-popup.open { display: block; }
@keyframes popIn {
  from { opacity: 0; transform: translateY(12px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.tpl-popup-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--b1);
}

.tpl-popup-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.tpl-popup-close {
  width: 24px; height: 24px;
  border-radius: var(--r-xs);
  border: none;
  background: var(--s3);
  color: var(--t3);
  cursor: pointer;
  display: grid; place-items: center;
  transition: background var(--t-fast) var(--ease), color var(--t-fast) var(--ease);
}
.tpl-popup-close:hover { background: var(--s4); color: var(--t1); }

.tpl-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
}

.tpl-item {
  padding: 14px 18px;
  cursor: pointer;
  background: transparent;
  border: none;
  border-right: 1px solid var(--b1);
  border-bottom: 1px solid var(--b1);
  text-align: left;
  transition: background var(--t-fast) var(--ease);
  position: relative;
  overflow: hidden;
}
/* 3-item grid: col 2 has no right border, last item has no bottom border */
.tpl-item:nth-child(2n) { border-right: none; }
.tpl-item:last-child { border-bottom: none; }
/* If last item is odd (alone in its row), remove its right border too */
.tpl-item:last-child:nth-child(odd) { border-right: none; }
.tpl-item:hover { background: var(--s3); }
.tpl-item:hover .tpl-item-arrow { opacity: 1; transform: translate(0,0); }

.tpl-item-icon {
  width: 32px; height: 32px;
  border-radius: var(--r-sm);
  background: var(--s3);
  border: 1px solid var(--b1);
  display: grid; place-items: center;
  margin-bottom: 10px;
  color: var(--accent);
}

.tpl-item-title {
  display: block;
  font-size: 13px;
  font-weight: 700;
  color: var(--t1);
  margin-bottom: 3px;
  line-height: 1.3;
}
.tpl-item-desc {
  display: block;
  font-size: 11.5px;
  color: var(--t3);
  line-height: 1.45;
}

.tpl-item-arrow {
  position: absolute;
  top: 12px; right: 12px;
  opacity: 0;
  transform: translate(-4px, 4px);
  transition: all var(--t-base) var(--ease);
  color: var(--accent);
}

/* File preview bar */
.file-preview-bar {
  display: none;
  align-items: center; gap: 10px;
  padding: 10px 14px;
  background: var(--s2);
  border: 1px solid rgba(124,110,250,0.3);
  border-bottom: none;
  border-radius: var(--r-md) var(--r-md) 0 0;
  font-size: 12px;
}
.file-preview-bar.on { display: flex; }
.fpb-icon { color: var(--accent); flex-shrink: 0; }
.fpb-name { flex: 1; font-weight: 500; color: var(--t1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.fpb-size { color: var(--t3); flex-shrink: 0; font-size: 11px; }
.fpb-rm {
  width: 22px; height: 22px;
  border-radius: var(--r-xs);
  border: none;
  background: var(--s3);
  color: var(--t3);
  cursor: pointer;
  display: grid; place-items: center;
  transition: all var(--t-fast) var(--ease);
  flex-shrink: 0;
}
.fpb-rm:hover { background: var(--red-dim); color: var(--red); }

/* Main input card */
.composer-card {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 10px 10px 16px;
  background: var(--s2);
  border: 1px solid var(--b2);
  border-radius: var(--r-lg);
  box-shadow: var(--sh-md);
  transition: border-color var(--t-base) var(--ease), box-shadow var(--t-base) var(--ease);
}
.composer-card:focus-within {
  border-color: rgba(124,110,250,0.45);
  box-shadow: var(--sh-md), 0 0 0 3px var(--accent-ring);
}
.file-preview-bar.on + .composer-card {
  border-top-left-radius: 0;
  border-top-right-radius: 0;
  border-top-color: transparent;
}

.composer-textarea {
  flex: 1;
  background: transparent;
  border: none; outline: none;
  color: var(--t1);
  font-family: inherit;
  font-size: 14px;
  font-weight: 400;
  line-height: 1.55;
  resize: none;
  min-height: 24px;
  max-height: 150px;
  padding: 0;
  align-self: center;
}
.composer-textarea::placeholder { color: var(--t4); }

.cmp-toolbar {
  display: flex; align-items: center; gap: 4px;
  flex-shrink: 0;
}

/* Icon buttons in composer */
.c-btn {
  width: 36px; height: 36px;
  border-radius: var(--r-sm);
  border: 1px solid transparent;
  background: transparent;
  color: var(--t3);
  cursor: pointer;
  display: grid; place-items: center;
  transition: all var(--t-fast) var(--ease);
}
.c-btn:hover { background: var(--s3); border-color: var(--b1); color: var(--t2); }
.c-btn.active { background: var(--accent-dim); border-color: rgba(124,110,250,0.3); color: var(--accent); }

/* Divider */
.c-divider {
  width: 1px; height: 20px;
  background: var(--b1);
  flex-shrink: 0;
  margin: 0 2px;
}

/* Send button */
.send-btn {
  width: 40px; height: 40px;
  border-radius: var(--r-sm);
  border: none;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: #fff;
  cursor: pointer;
  display: grid; place-items: center;
  box-shadow: var(--sh-accent);
  transition: transform var(--t-fast) var(--ease-spring), box-shadow var(--t-base) var(--ease), opacity var(--t-fast) var(--ease);
  flex-shrink: 0;
}
.send-btn:hover:not(:disabled) {
  transform: scale(1.08);
  box-shadow: 0 10px 36px rgba(124,110,250,0.45);
}
.send-btn:active:not(:disabled) { transform: scale(0.96); }
.send-btn:disabled {
  background: var(--s4);
  color: var(--t4);
  box-shadow: none;
  cursor: not-allowed;
}

/* Hidden file input */
input[type="file"] { display: none; }

/* ════════════════════════════════════════════════════
   MOBILE DRAWER
════════════════════════════════════════════════════ */
.drawer-mask {
  display: none;
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.drawer-mask.on { display: block; animation: fadeIn 0.22s var(--ease); }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.drawer-panel {
  position: absolute;
  top: 0; left: 0; bottom: 0;
  width: min(300px, 82vw);
  background: var(--s1);
  border-right: 1px solid var(--b2);
  transform: translateX(-100%);
  transition: transform 0.28s cubic-bezier(0.32, 0, 0.15, 1);
  overflow-y: auto;
  display: flex; flex-direction: column;
}
.drawer-mask.on .drawer-panel { transform: translateX(0); }

/* ════════════════════════════════════════════════════
   RESPONSIVE
════════════════════════════════════════════════════ */

/* ── Tablet ≤ 900px ── */
@media (max-width: 900px) {
  .app { grid-template-columns: 1fr; }
  .app > .sidebar { display: none; }
  .hamburger { display: grid; }
  .feed { padding: 20px 24px 12px; }
  .composer-outer { padding: 10px 16px max(16px, calc(10px + env(safe-area-inset-bottom))); }
  .tpl-popup { left: 16px; right: 16px; }
  .msg-row { max-width: 86%; }
}

/* ── Mobile ≤ 600px ── */
@media (max-width: 600px) {
  /* Header */
  .chat-header {
    padding: 0 12px;
    height: 54px;
    padding-top: env(safe-area-inset-top);
  }
  .ch-title { font-size: 13.5px; }
  .ch-badge { display: none; }
  .hdr-action span { display: none; }
  .hdr-action { padding: 0 10px; min-width: 36px; justify-content: center; }
  .hdr-icon-btn { width: 32px; height: 32px; }

  /* Feed — takes all available space */
  .feed {
    padding: 14px 14px 10px;
    gap: 0;
  }
  .msg-row { max-width: 92%; gap: 8px; }
  .msg-av { width: 28px; height: 28px; font-size: 11px; border-radius: var(--r-xs); }
  .msg-bubble { font-size: 13px; padding: 10px 13px; }

  /* Composer — pinned to bottom, safe area aware */
  .composer-outer {
    padding: 8px 12px max(14px, calc(8px + env(safe-area-inset-bottom)));
  }
  .tpl-popup {
    left: 10px; right: 10px;
    border-radius: var(--r-lg);
    max-height: 55vh;
    overflow-y: auto;
  }
  .tpl-grid { grid-template-columns: 1fr; }
  .tpl-item { padding: 12px 14px; }
  .tpl-item:nth-child(n) { border-right: none; }
  .tpl-item:last-child { border-bottom: none; }
  .tpl-item-icon { width: 28px; height: 28px; margin-bottom: 7px; }
  .tpl-item-title { font-size: 12.5px; }
  .tpl-item-desc { font-size: 11px; }

  .composer-card { padding: 8px 8px 8px 14px; border-radius: var(--r-md); }
  .composer-textarea { font-size: 16px; } /* 16px evita zoom no iOS ao focar */
  .c-btn { width: 34px; height: 34px; }
  .send-btn { width: 40px; height: 40px; border-radius: var(--r-sm); }
  .c-divider { display: none; }

  .file-preview-bar { padding: 8px 12px; font-size: 11.5px; }
  .day-sep-txt { font-size: 10px; }
}

/* ── Small mobile ≤ 380px ── */
@media (max-width: 380px) {
  .feed { padding: 10px 10px 8px; }
  .composer-outer { padding: 6px 8px max(12px, calc(6px + env(safe-area-inset-bottom))); }
  .msg-row { max-width: 96%; }
  .ch-title { font-size: 13px; }
  .hdr-action { display: none; }
}
</style>
</head>

   REFS
════════════════════════════════════════ */
const feed            = document.getElementById('feed');
const msgTa           = document.getElementById('msgTa');
const sendBtn         = document.getElementById('sendBtn');
const fileIn          = document.getElementById('fileIn');
const filePreviewBar  = document.getElementById('filePreviewBar');
const fpbName         = document.getElementById('fpbName');
const fpbSize         = document.getElementById('fpbSize');
const fpbRm           = document.getElementById('fpbRm');
const plusBtn         = document.getElementById('plusBtn');
const tplPopup        = document.getElementById('tplPopup');
const tplClose        = document.getElementById('tplClose');
const sbSessEl        = document.getElementById('sbSessEl');
const statusPill      = document.getElementById('statusPill');
const statusDot       = document.getElementById('statusDot');
const statusTxt       = document.getElementById('statusTxt');
const chDot           = document.getElementById('chDot');
const chStatusTxt     = document.getElementById('chStatusTxt');
const drawerMask      = document.getElementById('drawerMask');
const drawerPanel     = document.getElementById('drawerPanel');
const mainSidebar     = document.getElementById('mainSidebar');

/* ════════════════════════════════════════
   INIT
════════════════════════════════════════ */
const hhmm    = () => new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
const dateStr = () => new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});
const fmtBytes = b => b < 1024*1024 ? (b/1024).toFixed(1)+' KB' : (b/(1024*1024)).toFixed(1)+' MB';

document.getElementById('daySep').textContent  = dateStr();
document.getElementById('initTime').textContent = hhmm();
sbSessEl.textContent = sessId;

/* ════════════════════════════════════════
   STATUS
════════════════════════════════════════ */
function setOnline(ok) {
  statusPill.classList.toggle('err', !ok);
  statusDot.classList.toggle('err', !ok);  // controlled via CSS
  statusTxt.textContent = ok ? 'Online' : 'Erro';
  chDot.classList.toggle('err', !ok);
  chStatusTxt.textContent = ok ? 'Agente online' : 'Falha na conexão';
}

/* ════════════════════════════════════════
   TEXTAREA AUTO-RESIZE
════════════════════════════════════════ */
function resize() {
  msgTa.style.height = '24px';
  msgTa.style.height = Math.min(msgTa.scrollHeight, 150) + 'px';
}
function syncSend() {
  sendBtn.disabled = !msgTa.value.trim() && !fileIn.files.length;
}
function scrollFeed() { feed.scrollTop = feed.scrollHeight; }

/* ════════════════════════════════════════
   ADD MESSAGE
════════════════════════════════════════ */
let lastRole = '';

function addMsg(html, role = 'user', isErr = false) {
  const cont = role === lastRole;
  lastRole = role;

  const row = document.createElement('div');
  row.className = `msg-row ${role}${cont ? ' cont' : ''}`;

  const av = document.createElement('div');
  av.className = 'msg-av';
  av.textContent = role === 'user' ? 'V' : 'C';

  const wrap = document.createElement('div');
  wrap.className = 'msg-body-wrap';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble' + (isErr ? ' err' : '');
  bubble.innerHTML = html;

  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  meta.innerHTML = `<span>${hhmm()}</span>` + (role === 'user' ? `
    <span class="ticks">
      <svg width="14" height="9" viewBox="0 0 16 10" fill="none">
        <path d="M1 5l3 3L10 1" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M6 5l3 3 6-7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </span>` : '');

  wrap.appendChild(bubble);
  wrap.appendChild(meta);
  row.appendChild(av);
  row.appendChild(wrap);
  feed.appendChild(row);
  scrollFeed();
}

/* ════════════════════════════════════════
   TYPING
════════════════════════════════════════ */
function showTyping() {
  const row = document.createElement('div');
  row.id = 'typRow';
  row.className = 'typing-row';

  const av = document.createElement('div');
  av.className = 'msg-av';
  av.style.cssText = 'background:linear-gradient(135deg,var(--s4),var(--s3));border:1px solid var(--b2);color:var(--accent);align-self:flex-end;margin-bottom:2px';
  av.textContent = 'C';

  const bub = document.createElement('div');
  bub.className = 'typing-bubble';
  bub.innerHTML = '<span></span><span></span><span></span>';

  row.appendChild(av);
  row.appendChild(bub);
  feed.appendChild(row);
  scrollFeed();
}
function hideTyping() {
  const t = document.getElementById('typRow');
  if (t) t.remove();
}

/* ════════════════════════════════════════
   CALL WEBHOOK
════════════════════════════════════════ */
async function callWH(text) {
  const r = await fetch(WH, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ chatInput: text, sessionId: sessId, timestamp: new Date().toISOString() })
  });
  const raw = await r.text();
  let d = {};
  try { d = raw ? JSON.parse(raw) : {}; } catch {
    if (r.ok && raw) return raw;
    throw new Error(raw || 'Resposta inválida');
  }
  if (!r.ok) throw new Error(d?.message || d?.error || d?.output?.mensagem_usuario || `HTTP ${r.status}`);
  const t = d?.output?.mensagem_usuario || d?.output?.text || d?.output?.message ||
            d?.mensagem_usuario || d?.text || d?.message || d?.response || 'Sem resposta do agente.';
  return typeof t === 'string' ? t : JSON.stringify(t);
}

/* ════════════════════════════════════════
   SEND
════════════════════════════════════════ */
async function send() {
  const txt  = msgTa.value.trim();
  const file = fileIn.files[0];
  if (!txt && !file) return;

  let html = '';
  if (file) {
    html += `<div class="file-chip-in">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
        <path d="M14 2v6h6" stroke="currentColor" stroke-width="1.8"/>
      </svg>
      <span>${file.name}</span>
    </div>`;
  }
  if (txt) html += txt.replace(/\n/g, '<br>');

  addMsg(html, 'user');

  msgTa.value = ''; fileIn.value = '';
  filePreviewBar.classList.remove('on');
  resize(); syncSend(); sendBtn.disabled = true;
  closeTpl();

  chStatusTxt.textContent = 'Digitando…';
  showTyping();

  try {
    const resp = await callWH(txt || (file ? `Arquivo: ${file.name}` : ''));
    hideTyping();
    addMsg(resp.replace(/\n/g, '<br>'), 'agent');
    setOnline(true);
  } catch(e) {
    hideTyping();
    addMsg(`Erro ao contatar o agente: ${e.message}`, 'agent', true);
    setOnline(false);
  }
  syncSend();
}

/* ════════════════════════════════════════
   NEW CHAT
════════════════════════════════════════ */
function newChat() {
  sessId = mkSess();
  sbSessEl.textContent = sessId;
  lastRole = '';
  feed.innerHTML = `
    <div class="day-sep"><span class="day-sep-txt">${dateStr()}</span></div>
    <div class="msg-row agent">
      <div class="msg-av">C</div>
      <div class="msg-body-wrap">
        <div class="msg-bubble">
          Olá! Você está na <strong>Central de Prazos</strong> da Controladoria Jurídica.<br><br>
          Para iniciar, informe seu <strong>nome</strong> e <strong>setor</strong>.<br>
          Use o botão <strong>＋</strong> para acessar os modelos de preenchimento.
        </div>
        <div class="msg-meta"><span>${hhmm()}</span></div>
      </div>
    </div>`;
  msgTa.value = ''; fileIn.value = '';
  filePreviewBar.classList.remove('on');
  resize(); syncSend(); setOnline(true);
  drawerMask.classList.remove('on');
  scrollFeed();
}

/* ════════════════════════════════════════
   TEMPLATE POPUP
════════════════════════════════════════ */
const closeTpl = () => { tplPopup.classList.remove('open'); plusBtn.classList.remove('active'); };

plusBtn.addEventListener('click', e => {
  e.stopPropagation();
  tplPopup.classList.toggle('open');
  plusBtn.classList.toggle('active');
});
tplClose.addEventListener('click', closeTpl);

document.querySelectorAll('.tpl-item').forEach(btn => {
  btn.addEventListener('click', () => {
    msgTa.value = btn.dataset.text; resize(); syncSend(); msgTa.focus(); closeTpl();
  });
});

document.addEventListener('click', e => {
  if (!tplPopup.contains(e.target) && e.target !== plusBtn) closeTpl();
});

/* Template in sidebar */
function bindSbTemplates(container) {
  container.querySelectorAll('[data-text]').forEach(btn => {
    btn.addEventListener('click', () => {
      msgTa.value = btn.dataset.text; resize(); syncSend(); msgTa.focus();
      drawerMask.classList.remove('on');
    });
  });
  const nb = container.querySelector('#sbNewBtn');
  if (nb) nb.addEventListener('click', newChat);
}
bindSbTemplates(mainSidebar);

/* ════════════════════════════════════════
   FILE INPUT
════════════════════════════════════════ */
fileIn.addEventListener('change', () => {
  const f = fileIn.files[0];
  if (f) {
    fpbName.textContent = f.name;
    fpbSize.textContent = fmtBytes(f.size);
    filePreviewBar.classList.add('on');
  }
  syncSend();
});
fpbRm.addEventListener('click', () => {
  fileIn.value = ''; filePreviewBar.classList.remove('on'); syncSend();
});

/* ════════════════════════════════════════
   INPUT EVENTS
════════════════════════════════════════ */
msgTa.addEventListener('input', () => { resize(); syncSend(); });
msgTa.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
sendBtn.addEventListener('click', send);

document.getElementById('hdrNewBtn').addEventListener('click', newChat);

/* ════════════════════════════════════════
   MOBILE DRAWER
════════════════════════════════════════ */
document.getElementById('hamburger').addEventListener('click', () => {
  drawerPanel.innerHTML = mainSidebar.innerHTML;
  // fix IDs to avoid duplicates
  drawerPanel.querySelectorAll('[id]').forEach(el => el.removeAttribute('id'));
  bindSbTemplates(drawerPanel);
  // new chat from drawer
  const nb = drawerPanel.querySelector('.sb-new-btn');
  if (nb) nb.addEventListener('click', newChat);
  drawerMask.classList.add('on');
});
drawerMask.addEventListener('click', e => {
  if (e.target === drawerMask) drawerMask.classList.remove('on');
});

resize();
</script>
</body>
</html>
